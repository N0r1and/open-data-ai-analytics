<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Housing Prices Analytics</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f7fa; color: #333; }
        nav {
            background: #2E75B6; padding: 0 30px;
            display: flex; align-items: center; gap: 0;
        }
        nav a {
            color: white; text-decoration: none; padding: 16px 20px;
            display: block; font-size: 15px; transition: background 0.2s;
        }
        nav a:hover, nav a.active { background: #1a5a9e; }
        nav .brand { font-weight: bold; font-size: 17px; margin-right: 20px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .card {
            background: white; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 25px; margin-bottom: 20px;
        }
        h1 { color: #2E75B6; margin-bottom: 15px; font-size: 24px; }
        h2 { color: #444; margin-bottom: 12px; font-size: 19px; }
        h3 { color: #555; margin-bottom: 8px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #2E75B6; color: white; padding: 10px 12px; text-align: left; }
        td { padding: 8px 12px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f0f6ff; }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 13px; font-weight: bold;
        }
        .badge-green { background: #d4edda; color: #155724; }
        .badge-red   { background: #f8d7da; color: #721c24; }
        .badge-blue  { background: #d1ecf1; color: #0c5460; }
        .stat-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; margin-top: 10px;
        }
        .stat-box {
            background: #f0f6ff; border-radius: 8px; padding: 15px; text-align: center;
        }
        .stat-box .val { font-size: 26px; font-weight: bold; color: #2E75B6; }
        .stat-box .lbl { font-size: 12px; color: #666; margin-top: 4px; }
        img.plot { max-width: 100%; border-radius: 6px; margin-top: 10px; }
        .conclusion {
            background: #e8f4fd; border-left: 4px solid #2E75B6;
            padding: 10px 15px; border-radius: 0 6px 6px 0; margin-top: 8px;
        }
    </style>
</head>
<body>
<nav>
    <span class="brand">🏠 Housing Analytics</span>
    <a href="/">Головна</a>
    <a href="/data">Дані</a>
    <a href="/quality">Якість</a>
    <a href="/research">Аналіз</a>
    <a href="/visualization">Графіки</a>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>

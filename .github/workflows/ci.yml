name: CI (modules)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Який модуль запустити"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  data_load:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.module == 'all' ||
      github.event.inputs.module == 'data_load'
    steps:
      - name: Checkout коду
        uses: actions/checkout@v4

      - name: Налаштування Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Встановлення залежностей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Підготовка даних
        run: |
          mkdir -p data/raw
          if [ -f "data/129-indeksi-tsin-na-zhitlo.xlsx" ]; then
            cp data/129-indeksi-tsin-na-zhitlo.xlsx data/raw/
            echo "Датасет знайдено і скопійовано"
          else
            echo "УВАГА: датасет не знайдено"
          fi

      - name: Запуск data_load
        run: |
          mkdir -p artifacts/data_load
          python src/data_load.py 2>&1 | tee artifacts/data_load/run.log

      - name: Завантаження артефактів
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_load
          path: artifacts/data_load
          retention-days: 7

  data_quality_analysis:
    runs-on: ubuntu-latest
    needs: data_load
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.module == 'all' ||
      github.event.inputs.module == 'data_quality_analysis'
    steps:
      - name: Checkout коду
        uses: actions/checkout@v4

      - name: Налаштування Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Встановлення залежностей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Підготовка даних
        run: |
          mkdir -p data/raw
          if [ -f "data/129-indeksi-tsin-na-zhitlo.xlsx" ]; then
            cp data/129-indeksi-tsin-na-zhitlo.xlsx data/raw/
          fi
          python src/data_load.py

      - name: Запуск data_quality_analysis
        run: |
          mkdir -p artifacts/data_quality_analysis
          python src/data_quality_analysis.py 2>&1 | tee artifacts/data_quality_analysis/run.log

      - name: Завантаження артефактів
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_quality_analysis
          path: artifacts/data_quality_analysis
          retention-days: 7

  data_research:
    runs-on: ubuntu-latest
    needs: data_load
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.module == 'all' ||
      github.event.inputs.module == 'data_research'
    steps:
      - name: Checkout коду
        uses: actions/checkout@v4

      - name: Налаштування Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Встановлення залежностей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Підготовка даних
        run: |
          mkdir -p data/raw
          if [ -f "data/129-indeksi-tsin-na-zhitlo.xlsx" ]; then
            cp data/129-indeksi-tsin-na-zhitlo.xlsx data/raw/
          fi
          python src/data_load.py

      - name: Запуск data_research
        run: |
          mkdir -p artifacts/data_research
          python src/data_research.py 2>&1 | tee artifacts/data_research/run.log

      - name: Завантаження артефактів
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_research
          path: artifacts/data_research
          retention-days: 7

  visualization:
    runs-on: ubuntu-latest
    needs: data_load
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.module == 'all' ||
      github.event.inputs.module == 'visualization'
    steps:
      - name: Checkout коду
        uses: actions/checkout@v4

      - name: Налаштування Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Встановлення залежностей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Підготовка даних
        run: |
          mkdir -p data/raw
          if [ -f "data/129-indeksi-tsin-na-zhitlo.xlsx" ]; then
            cp data/129-indeksi-tsin-na-zhitlo.xlsx data/raw/
          fi
          python src/data_load.py

      - name: Запуск visualization
        run: |
          mkdir -p artifacts/visualization
          python src/visualization.py 2>&1 | tee artifacts/visualization/run.log

      - name: Завантаження артефактів
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-visualization
          path: artifacts/visualization
          retention-days: 7
